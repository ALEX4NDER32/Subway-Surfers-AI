<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfer - Fixed Record</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #game-container { position: relative; width: 400px; height: 600px; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; }
        canvas { background: #1a1a1a; display: block; border: 4px solid #333; border-radius: 12px; }
        
        .ui { position: absolute; left: 20px; color: white; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; font-weight: 900; display: none; }
        #ui-dist { top: 20px; font-size: 22px; }
        #ui-coins { top: 50px; font-size: 20px; color: #ffd700; }
        
        #powerup-container { position: absolute; top: 85px; left: 20px; z-index: 10; pointer-events: none; }
        .pu-timer { font-size: 16px; font-weight: bold; margin-bottom: 5px; display: none; }
        
        #pause-btn { position: absolute; top: 15px; right: 15px; padding: 10px 15px; background: rgba(255, 255, 255, 0.9); border: none; border-radius: 8px; cursor: pointer; z-index: 20; font-weight: bold; display: none; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; text-align: center; }
        
        #shop-screen { display: none; background: linear-gradient(to bottom, #2c3e50, #000); }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .shop-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .shop-item.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }
        
        .btn { padding: 12px 25px; margin: 8px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; color: white; transition: 0.2s; }
        .btn:hover { transform: scale(1.05); }
        
        .stats-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 10px 0; min-width: 220px; border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-size: 44px; color: #e67e22; text-shadow: 3px 3px #000; margin: 0; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="overlay">
            <h1>SUBWAY SURFER</h1>
            <div class="stats-box">
                <p>🏆 Récord: <span id="best-dist">0</span>m</p>
                <p>🪙 Monedas: <span id="total-coins">0</span></p>
            </div>
            <button class="btn" style="background:#e67e22" onclick="startGame()">JUGAR</button>
            <button class="btn" style="background:#3498db" onclick="toggleShop(true)">TIENDA 🛒</button>
        </div>

        <div id="shop-screen" class="overlay">
            <h2>TIENDA DE SKINS</h2>
            <p>Tus Monedas: <span id="shop-coins-display">0</span> 🪙</p>
            <div class="shop-grid" id="shop-grid"></div>
            <button class="btn" style="background:#e74c3c" onclick="toggleShop(false)">VOLVER</button>
        </div>

        <div id="ui-dist" class="ui">0m</div>
        <div id="ui-coins" class="ui">🪙 0</div>
        <div id="powerup-container">
            <div id="mag-ui" class="pu-timer" style="color:#3498db">🧲 IMÁN: <span id="mag-time">0</span>s</div>
            <div id="imm-ui" class="pu-timer" style="color:#2ecc71">💪 INMUNE: <span id="imm-time">0</span>s</div>
        </div>
        <button id="pause-btn" onclick="togglePause()">PAUSA</button>

        <div id="menu-overlay" class="overlay" style="display: none;">
            <h2 id="menu-title">PAUSA</h2>
            <div id="game-over-stats" style="margin-bottom: 20px; display: none;">
                <p id="final-dist"></p>
                <p id="new-record-msg" style="color: #2ecc71; font-weight: bold; display: none;">¡NUEVO RÉCORD!</p>
            </div>
            <button id="resume-btn" class="btn" style="background:#2ecc71" onclick="togglePause()">CONTINUAR</button>
            <button class="btn" style="background:#e74c3c" onclick="location.reload()">INICIO</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 400; canvas.height = 600;

    let stats = {
        record: parseInt(localStorage.getItem('subway_record')) || 0,
        totalCoins: parseInt(localStorage.getItem('subway_total_coins')) || 0,
        unlockedSkins: JSON.parse(localStorage.getItem('subway_skins')) || ['Original'],
        currentSkin: localStorage.getItem('subway_active_skin') || 'Original'
    };

    const skins = [
        { name: 'Original', color: '#e67e22', price: 0 },
        { name: 'Ninja', color: '#2c3e50', price: 100 },
        { name: 'Neon', color: '#00ffcc', price: 250 },
        { name: 'Oro', color: '#f1c40f', price: 500 }
    ];

    function updateStatsDisplay() {
        document.getElementById('best-dist').innerText = stats.record;
        document.getElementById('total-coins').innerText = stats.totalCoins;
        document.getElementById('shop-coins-display').innerText = stats.totalCoins;
    }

    function toggleShop(show) {
        document.getElementById('shop-screen').style.display = show ? 'flex' : 'none';
        if(show) renderShop();
    }

    function renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        skins.forEach(skin => {
            const isUnlocked = stats.unlockedSkins.includes(skin.name);
            const isSelected = stats.currentSkin === skin.name;
            const div = document.createElement('div');
            div.className = `shop-item ${isSelected ? 'selected' : ''}`;
            div.innerHTML = `
                <div style="background:${skin.color}; width:40px; height:40px; margin:0 auto; border-radius:8px; border:2px solid white;"></div>
                <p style="margin:8px 0; font-weight:bold">${skin.name}</p>
                <small>${isUnlocked ? (isSelected ? 'EQUIPADO' : 'USAR') : skin.price + ' 🪙'}</small>
            `;
            div.onclick = () => buyOrEquip(skin);
            grid.appendChild(div);
        });
    }

    function buyOrEquip(skin) {
        if (stats.unlockedSkins.includes(skin.name)) {
            stats.currentSkin = skin.name;
        } else if (stats.totalCoins >= skin.price) {
            stats.totalCoins -= skin.price;
            stats.unlockedSkins.push(skin.name);
            stats.currentSkin = skin.name;
        } else return;
        localStorage.setItem('subway_total_coins', stats.totalCoins);
        localStorage.setItem('subway_skins', JSON.stringify(stats.unlockedSkins));
        localStorage.setItem('subway_active_skin', stats.currentSkin);
        updateStatsDisplay();
        renderShop();
    }

    const LANES_START = [175, 200, 225], LANES_END = [80, 200, 320];    
    let currentLane = 1, distance = 0, coinsSession = 0, speed = 5.2, gameStatus = 'menu';
    let objects = [], lastSpawn = 0, animFrame = 0;
    let magnetActive = false, magnetTimer = 0, lastMagnetSpawnDist = 0;
    let immunityActive = false, immunityTimer = 0, lastImmunitySpawnDist = 0;
    let playerYOffset = 0, jumpVelocity = 0, isJumping = false;
    const gravity = 0.65, jumpStrength = 13;

    window.addEventListener("keydown", (e) => {
        if(gameStatus !== 'playing') return;
        if(e.key === "ArrowLeft" && currentLane > 0) currentLane--;
        if(e.key === "ArrowRight" && currentLane < 2) currentLane++;
        if((e.key === "ArrowUp" || e.key === " ") && !isJumping) { jumpVelocity = jumpStrength; isJumping = true; }
    });

    function startGame() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("pause-btn").style.display = "block";
        document.querySelectorAll(".ui").forEach(el => el.style.display = "block");
        gameStatus = 'playing';
        gameLoop();
    }

    function togglePause() {
        if(gameStatus === 'over') return;
        if(gameStatus === 'playing') {
            gameStatus = 'paused';
            document.getElementById("menu-overlay").style.display = "flex";
        } else {
            gameStatus = 'playing';
            document.getElementById("menu-overlay").style.display = "none";
            gameLoop();
        }
    }

    function drawCar(x, y, size) {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.ellipse(x, y, size/2, size/6, 0, 0, Math.PI*2); ctx.fill();
        let grad = ctx.createLinearGradient(x - size/2, y, x + size/2, y);
        grad.addColorStop(0, "#34495e"); grad.addColorStop(0.5, "#95a5a6"); grad.addColorStop(1, "#34495e");
        ctx.fillStyle = grad; ctx.fillRect(x - size/2, y - size * 1.1, size, size * 1.1);
        ctx.fillStyle = "#3498db"; ctx.fillRect(x - size/2 + size*0.1, y - size * 0.95, size * 0.8, size/2.5);
        ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(x - size/3, y - size*0.15, size*0.1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + size/3, y - size*0.15, size*0.1, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function drawTruck(x, y, size) {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.ellipse(x, y, size*0.7, size/5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(x - size * 0.6, y - size * 1.8, size * 1.2, size * 1.8);
        ctx.fillStyle = "#c0392b";
        ctx.fillRect(x - size * 0.5, y - 10, size, 5);
        ctx.restore();
    }

    function drawCoin(x, y, size) {
        ctx.save();
        ctx.fillStyle = "#ffd700";
        ctx.beginPath(); ctx.arc(x, y - size/2, size/2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#b8860b"; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
    }

    function drawPowerUp(x, y, size, emoji, color) {
        ctx.save(); ctx.translate(x, y - size/2);
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.font = `${size*0.6}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(emoji, 0, 0); ctx.restore();
    }

    function drawPlayer(x, y) {
        ctx.save();
        ctx.translate(x, y - playerYOffset);
        if (immunityActive) ctx.globalAlpha = 0.5 + Math.sin(animFrame * 0.2) * 0.3;
        const skinData = skins.find(s => s.name === stats.currentSkin);
        ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.ellipse(0, 5, 18, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = skinData.color; ctx.fillRect(-15, -50, 30, 45);
        ctx.fillStyle = "#f3e0c0"; ctx.beginPath(); ctx.arc(0, -60, 13, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#2980b9"; ctx.fillRect(-14, -73, 28, 9);
        ctx.restore();
    }

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0f0f"; ctx.fillRect(0, 0, 400, 160);
        ctx.fillStyle = "#2c3e50";
        ctx.beginPath(); ctx.moveTo(175, 160); ctx.lineTo(225, 160); ctx.lineTo(450, 600); ctx.lineTo(-50, 600); ctx.fill();
        ctx.strokeStyle = "#34495e"; ctx.lineWidth = 2;
        [175, 192, 208, 225].forEach((xs, i) => {
            ctx.beginPath(); ctx.moveTo(xs, 160); ctx.lineTo([-50, 110, 290, 450][i], 600); ctx.stroke();
        });

        objects.forEach(o => {
            if (o.type === 'car') drawCar(o.currentX, o.y, o.size);
            else if (o.type === 'truck') drawTruck(o.currentX, o.y, o.size);
            else if (o.type === 'coin') drawCoin(o.currentX, o.y, o.size);
            else if (o.type === 'magnet') drawPowerUp(o.currentX, o.y, o.size, "🧲", "#3498db");
            else if (o.type === 'immunity') drawPowerUp(o.currentX, o.y, o.size, "💪", "#2ecc71");
        });
        drawPlayer(LANES_END[currentLane], 540);
    }

    function update() {
        distance += speed;
        speed += 0.0012; 
        let spawnInterval = Math.max(90, 200 - (distance / 400));
        animFrame++;

        if (isJumping) { playerYOffset += jumpVelocity; jumpVelocity -= gravity; if (playerYOffset <= 0) { playerYOffset = 0; isJumping = false; } }

        if (magnetActive) { magnetTimer -= 0.016; document.getElementById("mag-ui").style.display = "block"; document.getElementById("mag-time").innerText = Math.ceil(magnetTimer); if (magnetTimer <= 0) { magnetActive = false; document.getElementById("mag-ui").style.display = "none"; } }
        if (immunityActive) { immunityTimer -= 0.016; document.getElementById("imm-ui").style.display = "block"; document.getElementById("imm-time").innerText = Math.ceil(immunityTimer); if (immunityTimer <= 0) { immunityActive = false; document.getElementById("imm-ui").style.display = "none"; } }

        for (let i = objects.length - 1; i >= 0; i--) {
            let o = objects[i]; o.y += speed * (o.y / 280);
            let progress = Math.max(0, Math.min(1, (o.y - 160) / (540 - 160)));
            o.size = 20 + (progress * 70);
            let idealX = LANES_START[o.lane] + (LANES_END[o.lane] - LANES_START[o.lane]) * progress;
            if (magnetActive && o.type === 'coin' && progress > 0.2) o.currentX += (LANES_END[currentLane] - o.currentX) * 0.2;
            else o.currentX = idealX;

            if (o.y > 480 && o.y < 580 && Math.abs(o.currentX - LANES_END[currentLane]) < o.size/1.5) {
                if (!immunityActive) {
                    if (o.type === 'car' && playerYOffset < 35) { gameOver(); return; }
                    else if (o.type === 'truck') { gameOver(); return; }
                }
                if (o.type === 'coin') { coinsSession++; document.getElementById("ui-coins").innerText = "🪙 " + coinsSession; objects.splice(i, 1); }
                else if (o.type === 'magnet') { magnetActive = true; magnetTimer = 5; objects.splice(i, 1); }
                else if (o.type === 'immunity') { immunityActive = true; immunityTimer = 10; objects.splice(i, 1); }
            }
            if (o.y > 650) objects.splice(i, 1);
        }

        if (distance - lastSpawn > spawnInterval) {
            let lane = Math.floor(Math.random() * 3);
            let type = 'car';
            if (distance - lastImmunitySpawnDist > 12000) { type = 'immunity'; lastImmunitySpawnDist = distance; }
            else if (distance - lastMagnetSpawnDist > 5500) { type = 'magnet'; lastMagnetSpawnDist = distance; }
            else {
                let r = Math.random();
                type = r < 0.15 ? 'truck' : (r < 0.50 ? 'coin' : 'car');
            }
            objects.push({ type, lane, y: 160, currentX: LANES_START[lane], size: 20 });
            lastSpawn = distance;
        }
        document.getElementById("ui-dist").innerText = Math.floor(distance/10) + "m";
    }

    function gameOver() {
        gameStatus = 'over';
        const finalDistVal = Math.floor(distance/10);
        
        // CORRECCIÓN DE RÉCORD
        let isNewRecord = false;
        if (finalDistVal > stats.record) {
            stats.record = finalDistVal;
            localStorage.setItem('subway_record', stats.record);
            isNewRecord = true;
        }
        
        stats.totalCoins += coinsSession;
        localStorage.setItem('subway_total_coins', stats.totalCoins);
        
        document.getElementById("menu-title").innerText = "¡GAME OVER!";
        document.getElementById("final-dist").innerText = "Distancia: " + finalDistVal + "m";
        document.getElementById("new-record-msg").style.display = isNewRecord ? "block" : "none";
        
        document.getElementById("game-over-stats").style.display = "block";
        document.getElementById("resume-btn").style.display = "none";
        document.getElementById("menu-overlay").style.display = "flex";
        document.getElementById("pause-btn").style.display = "none";
    }

    function gameLoop() { if(gameStatus === 'playing') { update(); drawScene(); requestAnimationFrame(gameLoop); } }

    updateStatsDisplay();
    drawScene();
</script>
</body>
</html>
